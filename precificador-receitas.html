<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Precificador de Receitas</title>

<!--
  ============================================================
  PRECIFICADOR DE RECEITAS — arquivo único e autossuficiente
  ============================================================

  COMO USAR (para a sua mãe):
    - Dê dois cliques neste arquivo. Ele abre no navegador e já funciona.
    - Funciona no computador e no celular (precisa de internet só na 1ª abertura).
    - Os produtos salvos ficam guardados no próprio aparelho.

  BACKUP DAS RECEITAS (importante):
    - Na aba "Produtos salvos" há os botões "Fazer backup" e "Importar backup".
    - "Fazer backup" baixa um arquivo com todas as receitas (guarde no WhatsApp/nuvem).
    - "Importar backup" recupera as receitas a partir desse arquivo — serve para
      trocar de aparelho ou repassar as receitas para outra pessoa.
    - Os dados ficam só no aparelho; sem backup, limpar o navegador apaga tudo.

  COMO EDITAR / CONTINUAR O DESENVOLVIMENTO:
    - Abra este mesmo arquivo num editor de código (ex: VS Code).
    - Todo o código React está mais abaixo, dentro de <script type="text/babel">.
    - O código está organizado em blocos comentados para facilitar.

  ============================================================
-->

<!-- Bibliotecas (React + Babel) carregadas da internet na primeira abertura -->

<script type="text/babel">
const { useState, useMemo, useEffect, useCallback } = React;

/* ============================================================
   1) ÍCONES (SVG simples, sem depender de biblioteca externa)
   ============================================================ */
const ICONS = {
  chef: '<path d="M6 13.87A4 4 0 0 1 7.41 6a5.11 5.11 0 0 1 1.05-1.54 5 5 0 0 1 7.08 0A5.11 5.11 0 0 1 16.59 6 4 4 0 0 1 18 13.87V21H6Z"/><line x1="6" y1="17" x2="18" y2="17"/>',

  info: '<circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>',
  save: '<path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>',
  search: '<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>',
  folder: '<path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>',
  calc: '<rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="14" x2="8" y2="14"/><line x1="12" y1="14" x2="12" y2="14"/><line x1="16" y1="14" x2="16" y2="14"/><line x1="8" y1="18" x2="8" y2="18"/><line x1="12" y1="18" x2="12" y2="18"/><line x1="16" y1="18" x2="16" y2="18"/>',
  chevron: '<polyline points="6 9 12 15 18 9"/>',
  loader: '<path d="M21 12a9 9 0 1 1-6.219-8.56"/>',
  cart: '<circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>',
  check: '<polyline points="20 6 9 17 4 12"/>',
  alert: '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>',
  plus: '<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>',
  trash: '<polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>',
  download: '<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>',
  upload: '<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>',
  shield: '<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>',
};
function Ic({ n, s = 16, c = "currentColor", style, cls }) {
  return (
    <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c}
      strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
      className={cls} style={style}
      dangerouslySetInnerHTML={{ __html: ICONS[n] }} />
  );
}

/* ============================================================
   2) CONSTANTES E FUNÇÕES AUXILIARES
   ============================================================ */
const C = {
  coral50: "#FAECE7", coral100: "#F5C4B3", coral200: "#F0997B",
  coral400: "#D85A30", coral600: "#993C1D", coral800: "#712B13",
};
const STORAGE_KEY = "precificador_produtos";

// Converte texto digitado (aceita vírgula) em número
const parseNum = (s) => parseFloat((String(s) || "").replace(",", ".")) || 0;
// Formata em Reais
const fmt = (v) => (!isFinite(v) || isNaN(v))
  ? "R$ 0,00"
  : new Intl.NumberFormat("pt-BR", { style: "currency", currency: "BRL" }).format(v);
// Formata data
const fmtData = (ts) =>
  new Intl.DateTimeFormat("pt-BR", { day: "2-digit", month: "2-digit", year: "numeric" }).format(new Date(ts));

// Salvar / ler do navegador (localStorage)
const lerProdutos = () => {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
};
const gravarProdutos = (lista) => {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(lista));
    return { ok: true };
  } catch (e) {
    return { ok: false, erro: "Não foi possível salvar neste aparelho (armazenamento cheio ou bloqueado). Faça um backup para não perder os dados." };
  }
};

// Versão do formato de backup (incrementar se o formato mudar no futuro)
const BACKUP_VERSAO = 1;
const BACKUP_APP_ID = "precificador-receitas";

// Monta o objeto de backup (envelope com metadados)
const montarBackup = (produtos) => ({
  app: BACKUP_APP_ID,
  versao: BACKUP_VERSAO,
  exportadoEm: new Date().toISOString(),
  produtos: Array.isArray(produtos) ? produtos : [],
});

// Nome de arquivo datado: receitas-backup-AAAA-MM-DD.json
const nomeArquivoBackup = () => {
  const d = new Date();
  const p = (n) => String(n).padStart(2, "0");
  return `receitas-backup-${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())}.json`;
};

// Dispara o download de um texto como arquivo
const baixarArquivo = (nome, conteudo) => {
  const blob = new Blob([conteudo], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = nome;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
};

// Valida o conteúdo importado. Retorna { ok, produtos, erro }
const validarBackup = (texto) => {
  let dados;
  try {
    dados = JSON.parse(texto);
  } catch {
    return { ok: false, erro: "Este arquivo não é um backup válido (não é um JSON)." };
  }
  if (!dados || typeof dados !== "object") {
    return { ok: false, erro: "Este arquivo não é um backup de receitas." };
  }
  if (dados.app !== BACKUP_APP_ID) {
    return { ok: false, erro: "Este arquivo não parece ser um backup do Precificador de Receitas." };
  }
  if (!Array.isArray(dados.produtos)) {
    return { ok: false, erro: "O backup está sem a lista de produtos." };
  }
  // Garante que todo produto tenha um id (gera um se faltar)
  const produtos = dados.produtos.map((p, i) => ({
    ...p,
    id: p && p.id != null ? String(p.id) : `import-${i}-${p && p.savedAt ? p.savedAt : "x"}`,
  }));
  return { ok: true, produtos };
};

// Mescla a lista importada na atual, por id. Retorna { lista, novas, atualizadas }
const mesclarProdutos = (atuais, importados) => {
  const porId = new Map(atuais.map((p) => [String(p.id), p]));
  let novas = 0;
  let atualizadas = 0;
  importados.forEach((imp) => {
    const id = String(imp.id);
    if (porId.has(id)) atualizadas++;
    else novas++;
    porId.set(id, imp);
  });
  // Mais recentes primeiro (usa savedAt quando existir)
  const lista = Array.from(porId.values()).sort(
    (a, b) => (b.savedAt || 0) - (a.savedAt || 0)
  );
  return { lista, novas, atualizadas };
};

/* ============================================================
   3) COMPONENTES VISUAIS REUTILIZÁVEIS
   ============================================================ */
function Card({ children, highlight }) {
  return (
    <div className="card-anim" style={{
      background: "var(--color-background-primary)",
      border: highlight ? "1.5px solid " + C.coral200 : "0.5px solid var(--color-border-tertiary)",

      boxShadow: highlight ? "var(--shadow-card-hover)" : "var(--shadow-card)",

}
function SecTitle({ children, icon }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 7, marginBottom: 12 }}>
      <span style={{ color: C.coral600, display: "flex" }}>{icon}</span>
      <h2 style={{ fontSize: 15, fontWeight: 500, margin: 0, color: "var(--color-text-primary)" }}>{children}</h2>

}
function Field({ label, children, hint }) {
  return (
    <div>
      <label style={{ display: "block", fontSize: 12, color: "var(--color-text-secondary)", marginBottom: 5 }}>{label}</label>
      {children}
      {hint && <p style={{ fontSize: 11, color: "var(--color-text-secondary)", marginTop: 4, marginBottom: 0 }}>{hint}</p>}

}
function Inp(props) {
  return <input {...props} style={{
    width: "100%", padding: "7px 10px",
    border: "0.5px solid var(--color-border-secondary)",
    borderRadius: "var(--border-radius-md)", fontSize: 14,
    color: "var(--color-text-primary)", background: "var(--color-background-secondary)",
    ...props.style,

}
function TabBtn({ active, onClick, icon, children, badge }) {
  return (
    <button onClick={onClick} style={{
      display: "flex", alignItems: "center", gap: 6, padding: "8px 14px",
      borderRadius: "var(--border-radius-md)", cursor: "pointer", fontSize: 14,
      border: active ? "0.5px solid " + C.coral200 : "0.5px solid transparent",

      color: active ? C.coral600 : "var(--color-text-secondary)",
      fontWeight: active ? 500 : 400,
    }}>
      {icon}{children}
      {badge > 0 && (
        <span style={{
          fontSize: 11, fontWeight: 500, minWidth: 18, height: 18, padding: "0 5px",
          borderRadius: 9, display: "inline-flex", alignItems: "center", justifyContent: "center",
          background: active ? C.coral400 : "var(--color-background-secondary)",
          color: active ? "#fff" : "var(--color-text-secondary)",
        }}>{badge}</span>
      )}
    </button>
  );
}

/* ============================================================
   4) ESTADO INICIAL DE UMA RECEITA EM BRANCO
   ============================================================ */
const receitaVazia = {
  produto: "", rendimento: "", tipoRend: "un",
  ingredientes: [{ id: 1, nome: "", custo: "" }],
  embalagem: "", gasEnergia: "", outros: "",
  horas: "", minutos: "", valorHora: "", margem: 50,
};

/* ============================================================
   5) COMPONENTE PRINCIPAL
   ============================================================ */
function App() {
  const [view, setView] = useState("calc");          // "calc" ou "salvos"
  const [st, setSt] = useState(receitaVazia);         // receita atual
  const [produtos, setProdutos] = useState([]);       // lista salva
  const [editId, setEditId] = useState(null);         // id em edição
  const [salvouFlash, setSalvouFlash] = useState(false);
  const [expandido, setExpandido] = useState(null);   // produto aberto na lista
  const [msg, setMsg] = useState(null); // { tipo: "erro"|"sucesso", texto }
  const [importPreview, setImportPreview] = useState(null); // { produtos, novas, atualizadas }

  const set = (patch) => setSt((p) => ({ ...p, ...patch }));

  // Carrega os produtos salvos quando abre
  useEffect(() => { setProdutos(lerProdutos()); }, []);

  const persistir = useCallback((lista) => {
    setProdutos(lista);
    const res = gravarProdutos(lista);
    if (!res.ok) setMsg({ tipo: "erro", texto: res.erro });
    return res.ok;
  }, []);

  // --- Ingredientes ---
  const addIngr = () => set({ ingredientes: [...st.ingredientes, { id: Date.now(), nome: "", custo: "" }] });
  const removeIngr = (id) => set({ ingredientes: st.ingredientes.length > 1 ? st.ingredientes.filter((i) => i.id !== id) : st.ingredientes });
  const updateIngr = (id, f, v) => set({ ingredientes: st.ingredientes.map((i) => (i.id === id ? { ...i, [f]: v } : i)) });
  const reset = () => { setSt(receitaVazia); setEditId(null); };

  // --- Cálculos (recalcula sozinho a cada digitação) ---
  const calc = useMemo(() => {
    const custoIngr = st.ingredientes.reduce((s, i) => s + parseNum(i.custo), 0);
    const custoEmb = parseNum(st.embalagem);
    const custoGas = parseNum(st.gasEnergia);
    const custoOut = parseNum(st.outros);
    const totalHoras = (parseInt(st.horas) || 0) + (parseInt(st.minutos) || 0) / 60;
    const custoMO = totalHoras * parseNum(st.valorHora);
    const custoTotal = custoIngr + custoEmb + custoGas + custoOut + custoMO;
    const ehKg = st.tipoRend === "kg";
    const quantidade = ehKg
      ? Math.max(parseNum(st.rendimento), 0.001)
      : Math.max(parseInt(st.rendimento) || 1, 1);
    const custoPorMedida = custoTotal / quantidade;
    return {
      custoIngr, custoEmb, custoGas, custoOut, custoMO, custoTotal, quantidade, custoPorMedida,
      precos: [20, 30, 50, 70, 100, 150].map((m) => ({
        margem: m, preco: custoPorMedida * (1 + m / 100),
        lucroUn: custoPorMedida * (m / 100), lucroTotal: custoPorMedida * (m / 100) * quantidade,
      })),
    };
  }, [st]);

  const hasData = calc.custoTotal > 0;
  const ehKg = st.tipoRend === "kg";
  const precoEscolhido = calc.custoPorMedida * (1 + st.margem / 100);

  // --- Salvar produto ---
  const salvar = () => {
    if (!hasData) return;
    const registro = {
      id: editId || String(Date.now()), ...st,
      custoTotal: calc.custoTotal, custoPorUn: calc.custoPorMedida, precoVenda: precoEscolhido,
      savedAt: editId ? (produtos.find((p) => p.id === editId)?.savedAt || Date.now()) : Date.now(),
      updatedAt: Date.now(),
    };
    const lista = editId ? produtos.map((p) => (p.id === editId ? registro : p)) : [registro, ...produtos];
    persistir(lista);
    setEditId(registro.id);
    setSalvouFlash(true);
    setTimeout(() => setSalvouFlash(false), 1800);
  };

  const carregar = (p) => {
    setSt({
      produto: p.produto, rendimento: p.rendimento, tipoRend: p.tipoRend || "un", ingredientes: p.ingredientes,
      embalagem: p.embalagem, gasEnergia: p.gasEnergia, outros: p.outros,
      horas: p.horas, minutos: p.minutos, valorHora: p.valorHora, margem: p.margem || 50,
    });
    setEditId(p.id); setView("calc");
  };
  const excluir = (id) => { persistir(produtos.filter((p) => p.id !== id)); if (editId === id) setEditId(null); };

  const exportarBackup = () => {
    try {
      const conteudo = JSON.stringify(montarBackup(produtos), null, 2);
      baixarArquivo(nomeArquivoBackup(), conteudo);
    } catch (e) {
      setMsg({ tipo: "erro", texto: "Não foi possível gerar o backup. Tente novamente." });
    }
  };

  // Lê o arquivo escolhido e prepara o resumo de confirmação
  const aoEscolherArquivo = (e) => {
    setMsg(null);
    const file = e.target.files && e.target.files[0];
    e.target.value = ""; // permite reescolher o mesmo arquivo depois
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      const res = validarBackup(String(reader.result));
      if (!res.ok) {
        setMsg({ tipo: "erro", texto: res.erro });
        return;
      }
      const prev = mesclarProdutos(produtos, res.produtos);
      setImportPreview(prev);
    };
    reader.onerror = () => setMsg({ tipo: "erro", texto: "Não foi possível ler o arquivo." });
    reader.readAsText(file);
  };

  // Confirma e aplica a importação
  const confirmarImportacao = () => {
    if (!importPreview) return;
    persistir(importPreview.lista);
    setMsg({
      tipo: "sucesso",
      texto: `Importado: ${importPreview.novas} nova(s), ${importPreview.atualizadas} atualizada(s).`,
    });
    setImportPreview(null);
  };

  const cancelarImportacao = () => setImportPreview(null);

  return (
    <div style={{ padding: "16px 0 40px" }}>
      {/* Cabeçalho */}
      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 18, paddingBottom: 16, borderBottom: "0.5px solid var(--color-border-tertiary)" }}>
        <div style={{
          width: 46, height: 46, borderRadius: 14, display: "flex", alignItems: "center", justifyContent: "center",
          background: "linear-gradient(135deg, " + C.coral400 + ", " + C.coral600 + ")",
          boxShadow: "0 4px 12px rgba(216,90,48,0.35)",
        }}>
          <Ic n="chef" s={24} c="#fff" />
        </div>
        <div>
          <h1 style={{ fontSize: 20, fontWeight: 600, margin: 0, letterSpacing: "-0.01em" }}>Precificador de receitas</h1>
          <p style={{ fontSize: 13, color: "var(--color-text-secondary)", margin: "2px 0 0" }}>Custo, margem e preço num só lugar</p>
        </div>
      </div>

      {/* Abas */}
      <div style={{ display: "flex", gap: 6, marginBottom: 16 }}>
        <TabBtn active={view === "calc"} onClick={() => setView("calc")} icon={<Ic n="calc" s={15} />}>Calculadora</TabBtn>
        <TabBtn active={view === "salvos"} onClick={() => setView("salvos")} icon={<Ic n="folder" s={15} />} badge={produtos.length}>Produtos salvos</TabBtn>
      </div>

      {view === "calc" && (
        <React.Fragment>
          {/* Produto */}
          <Card>
            <SecTitle icon={<Ic n="chef" s={15} />}>Produto</SecTitle>
            <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr", gap: 12 }}>
              <Field label="Nome do produto">
                <Inp value={st.produto} onChange={(e) => set({ produto: e.target.value })} placeholder="Ex: Brigadeiro gourmet" />
              </Field>
              <div>
                <label style={{ display: "block", fontSize: 12, color: "var(--color-text-secondary)", marginBottom: 5 }}>{ehKg ? "Rendimento (quilos)" : "Rendimento (unidades)"}</label>
                <div style={{ display: "flex", gap: 6, marginBottom: 6 }}>
                  {[["un", "por unidade"], ["kg", "por quilo"]].map(([v, lbl]) => {
                    const at = st.tipoRend === v;
                    return (
                      <button key={v} onClick={() => set({ tipoRend: v })} style={{
                        flex: 1, padding: "5px 0", fontSize: 12, borderRadius: "var(--border-radius-md)", cursor: "pointer",
                        border: at ? "0.5px solid " + C.coral200 : "0.5px solid var(--color-border-tertiary)",
                        background: at ? C.coral50 : "transparent",
                        color: at ? C.coral600 : "var(--color-text-secondary)", fontWeight: at ? 500 : 400,
                      }}>{lbl}</button>
                    );
                  })}
                </div>
                <Inp type="number" value={st.rendimento} onChange={(e) => set({ rendimento: e.target.value })} placeholder={ehKg ? "Ex: 2,5" : "Ex: 30"} min={ehKg ? "0" : "1"} step={ehKg ? "0.001" : "1"} />
                <p style={{ fontSize: 11, color: "var(--color-text-secondary)", marginTop: 4, marginBottom: 0 }}>{ehKg ? "Quanto a receita rende em kg?" : "Quantas peças a receita rende?"}</p>
              </div>
            </div>
          </Card>

          {/* Ingredientes */}
          <Card>
            <SecTitle icon={<Ic n="flame" s={15} />}>Ingredientes</SecTitle>
            <p style={{ fontSize: 13, color: "var(--color-text-secondary)", marginTop: -6, marginBottom: 14 }}>
              Custo de cada ingrediente na quantidade usada na receita (não o pacote inteiro)
            </p>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 120px 32px", gap: 8, marginBottom: 6 }}>
              <span style={{ fontSize: 12, color: "var(--color-text-secondary)", paddingLeft: 2 }}>Ingrediente</span>
              <span style={{ fontSize: 12, color: "var(--color-text-secondary)" }}>Custo na receita</span><span />
            </div>
            {st.ingredientes.map((ing) => (
              <div key={ing.id} style={{ display: "grid", gridTemplateColumns: "1fr 120px 32px", gap: 8, marginBottom: 8, alignItems: "center" }}>
                <Inp value={ing.nome} onChange={(e) => updateIngr(ing.id, "nome", e.target.value)} placeholder="Ex: Leite condensado" />
                <div style={{ position: "relative" }}>
                  <span style={{ position: "absolute", left: 9, top: "50%", transform: "translateY(-50%)", fontSize: 13, color: "var(--color-text-secondary)", pointerEvents: "none" }}>R$</span>
                  <Inp type="number" value={ing.custo} onChange={(e) => updateIngr(ing.id, "custo", e.target.value)} placeholder="0,00" min="0" step="0.01" style={{ paddingLeft: 30 }} />
                </div>
                <button onClick={() => removeIngr(ing.id)} disabled={st.ingredientes.length === 1} style={{ width: 32, height: 32, display: "flex", alignItems: "center", justifyContent: "center", borderRadius: "var(--border-radius-md)", border: "0.5px solid var(--color-border-tertiary)", background: "none", cursor: st.ingredientes.length === 1 ? "default" : "pointer", opacity: st.ingredientes.length === 1 ? 0.3 : 0.7 }}>
                  <Ic n="trash" s={14} c="var(--color-text-secondary)" />
                </button>
              </div>
            ))}
            <button onClick={addIngr} style={{ display: "flex", alignItems: "center", gap: 6, marginTop: 6, padding: "7px 14px", border: "0.5px dashed " + C.coral400, borderRadius: "var(--border-radius-md)", background: C.coral50, color: C.coral600, fontSize: 13, cursor: "pointer" }}>
              <Ic n="plus" s={14} /> Adicionar ingrediente
            </button>
          </Card>

          {/* Custos adicionais */}
          <Card>
            <SecTitle icon={<Ic n="package" s={15} />}>Custos adicionais</SecTitle>
            <p style={{ fontSize: 13, color: "var(--color-text-secondary)", marginTop: -6, marginBottom: 14 }}>Por lote completo (deixe em branco o que não se aplica)</p>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 12 }}>
              <Field label="Embalagem (R$)" hint="Pote, saco, caixinha"><Inp type="number" value={st.embalagem} onChange={(e) => set({ embalagem: e.target.value })} placeholder="0,00" min="0" step="0.01" /></Field>
              <Field label="Gás / Energia (R$)" hint="Estimativa por receita"><Inp type="number" value={st.gasEnergia} onChange={(e) => set({ gasEnergia: e.target.value })} placeholder="0,00" min="0" step="0.01" /></Field>
              <Field label="Outros (R$)" hint="Etiqueta, fita, extras"><Inp type="number" value={st.outros} onChange={(e) => set({ outros: e.target.value })} placeholder="0,00" min="0" step="0.01" /></Field>
            </div>
          </Card>

          {/* Mão de obra */}
          <Card>
            <SecTitle icon={<Ic n="clock" s={15} />}>Mão de obra</SecTitle>
            <p style={{ fontSize: 13, color: "var(--color-text-secondary)", marginTop: -6, marginBottom: 14 }}>O seu tempo tem valor — não trabalhe de graça!</p>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 12 }}>
              <Field label="Horas trabalhadas"><Inp type="number" value={st.horas} onChange={(e) => set({ horas: e.target.value })} placeholder="0" min="0" /></Field>
              <Field label="Minutos"><Inp type="number" value={st.minutos} onChange={(e) => set({ minutos: e.target.value })} placeholder="0" min="0" max="59" /></Field>
              <Field label="Valor por hora (R$)" hint="Sugestão: R$ 15 a R$ 25"><Inp type="number" value={st.valorHora} onChange={(e) => set({ valorHora: e.target.value })} placeholder="Ex: 20,00" min="0" step="0.5" /></Field>
            </div>
          </Card>

          {/* Resultado */}
          <Card highlight={hasData}>
            <SecTitle icon={<Ic n="trending" s={15} />}>{hasData && st.produto ? "Resultado — " + st.produto : "Resultado"}</SecTitle>
            {!hasData ? (
              <div style={{ padding: "30px 16px", textAlign: "center", color: "var(--color-text-secondary)", fontSize: 14 }}>
                <div style={{ width: 56, height: 56, margin: "0 auto 12px", borderRadius: "50%", background: "var(--color-background-secondary)", display: "flex", alignItems: "center", justifyContent: "center" }}>
                  <Ic n="trending" s={26} c={C.coral400} style={{ opacity: 0.8 }} />
                </div>
                Preencha os custos acima — o preço sugerido aparece aqui automaticamente.
              </div>
            ) : (
              <React.Fragment>
                <div style={{ background: "var(--color-background-secondary)", borderRadius: "var(--border-radius-md)", padding: "12px 14px", marginBottom: 18 }}>
                  <p style={{ fontSize: 11, color: "var(--color-text-secondary)", fontWeight: 500, textTransform: "uppercase", letterSpacing: "0.5px", marginBottom: 10 }}>Composição do custo</p>
                  {[
                    { label: "Ingredientes", v: calc.custoIngr, show: true },
                    { label: "Embalagem", v: calc.custoEmb, show: calc.custoEmb > 0 },
                    { label: "Gás / Energia", v: calc.custoGas, show: calc.custoGas > 0 },
                    { label: "Outros", v: calc.custoOut, show: calc.custoOut > 0 },
                    { label: "Mão de obra", v: calc.custoMO, show: calc.custoMO > 0 },
                  ].filter((r) => r.show).map((r) => (
                    <div key={r.label} style={{ display: "flex", justifyContent: "space-between", fontSize: 14, padding: "3px 0" }}>
                      <span style={{ color: "var(--color-text-secondary)" }}>{r.label}</span>
                      <span style={{ color: "var(--color-text-primary)", fontWeight: 500 }}>{fmt(r.v)}</span>
                    </div>
                  ))}
                  <div style={{ borderTop: "0.5px solid var(--color-border-tertiary)", marginTop: 10, paddingTop: 10 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 4 }}>
                      <span style={{ fontSize: 14, fontWeight: 500 }}>Custo total do lote</span>
                      <span style={{ fontSize: 20, fontWeight: 500, color: C.coral600 }}>{fmt(calc.custoTotal)}</span>
                    </div>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
                      <span style={{ fontSize: 13, color: "var(--color-text-secondary)" }}>{ehKg ? "Custo por quilo" : "Custo por unidade"} ({ehKg ? String(calc.quantidade).replace(".", ",") : calc.quantidade} {ehKg ? "kg" : "un."})</span>
                      <span style={{ fontSize: 15, fontWeight: 500, color: C.coral800 }}>{fmt(calc.custoPorMedida)}</span>
                    </div>
                  </div>
                </div>

                <p style={{ fontSize: 11, color: "var(--color-text-secondary)", fontWeight: 500, textTransform: "uppercase", letterSpacing: "0.5px", marginBottom: 8 }}>Escolha a margem (clique numa linha)</p>
                <div style={{ border: "0.5px solid var(--color-border-tertiary)", borderRadius: "var(--border-radius-md)", overflow: "hidden" }}>
                  <div style={{ display: "grid", gridTemplateColumns: "68px 1fr 1fr 1fr", background: "var(--color-background-secondary)", padding: "7px 14px", fontSize: 12, color: "var(--color-text-secondary)", fontWeight: 500 }}>
                    <span>Margem</span><span>{ehKg ? "Preço/kg" : "Preço/un."}</span><span>{ehKg ? "Lucro/kg" : "Lucro/un."}</span><span>Lucro total</span>
                  </div>
                  {calc.precos.map((p) => {
                    const sel = p.margem === st.margem;
                    return (
                      <div key={p.margem} onClick={() => set({ margem: p.margem })} className="card-anim" style={{
                        display: "grid", gridTemplateColumns: "68px 1fr 1fr 1fr", padding: "11px 14px",
                        borderTop: "0.5px solid var(--color-border-tertiary)",
                        background: sel ? C.coral50 : "transparent",
                        boxShadow: sel ? "inset 3px 0 0 " + C.coral400 : "none",
                        alignItems: "center", cursor: "pointer",
                      }}>
                        <span style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", width: 44, height: 22, borderRadius: "var(--border-radius-md)", background: sel ? C.coral400 : "var(--color-background-secondary)", color: sel ? "#fff" : "var(--color-text-secondary)", fontSize: 12, fontWeight: 500 }}>{p.margem}%</span>
                        <span style={{ fontSize: 15, fontWeight: 500 }}>{fmt(p.preco)}</span>
                        <span style={{ fontSize: 14, color: "var(--color-text-success)" }}>+{fmt(p.lucroUn)}</span>
                        <span style={{ fontSize: 14, fontWeight: 500, color: "var(--color-text-success)" }}>+{fmt(p.lucroTotal)}</span>
                      </div>
                    );
                  })}
                </div>

                {/* Salvar */}
                <div style={{ marginTop: 18, display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
                  <button onClick={salvar} className={salvouFlash ? "flash-ok" : ""} style={{ display: "flex", alignItems: "center", gap: 7, padding: "9px 16px", borderRadius: "var(--border-radius-md)", border: "0.5px solid " + C.coral400, background: salvouFlash ? "var(--color-background-success)" : C.coral400, color: salvouFlash ? "var(--color-text-success)" : "#fff", fontSize: 14, fontWeight: 500, cursor: "pointer" }}>
                    {salvouFlash ? <Ic n="check" s={15} /> : <Ic n="save" s={15} />}
                    {salvouFlash ? "Salvo!" : editId ? "Atualizar produto" : "Salvar produto"}
                  </button>
                  <button onClick={reset} style={{ display: "flex", alignItems: "center", gap: 6, padding: "9px 14px", borderRadius: "var(--border-radius-md)", border: "0.5px solid var(--color-border-tertiary)", background: "none", color: "var(--color-text-secondary)", fontSize: 13, cursor: "pointer" }}>
                    <Ic n="rotate" s={13} /> Nova receita
                  </button>
                  <div style={{ marginLeft: "auto", fontSize: 13, color: "var(--color-text-secondary)" }}>
                    Preço escolhido ({st.margem}%): <span style={{ fontWeight: 500, color: C.coral600, fontSize: 15 }}>{fmt(precoEscolhido)}</span>
                  </div>
                </div>
              </React.Fragment>
            )}
          </Card>
        </React.Fragment>
      )}

      {view === "salvos" && (
        <React.Fragment>
          <Card>
            <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
              <button onClick={exportarBackup} style={{ display: "flex", alignItems: "center", gap: 7, padding: "8px 14px", borderRadius: "var(--border-radius-md)", border: "0.5px solid " + C.coral200, background: C.coral50, color: C.coral600, fontSize: 13, fontWeight: 500, cursor: "pointer" }}>
                <Ic n="download" s={14} /> Fazer backup
              </button>
              <input id="inputImport" type="file" accept="application/json,.json" onChange={aoEscolherArquivo} style={{ display: "none" }} />
              <button onClick={() => document.getElementById("inputImport").click()} style={{ display: "flex", alignItems: "center", gap: 7, padding: "8px 14px", borderRadius: "var(--border-radius-md)", border: "0.5px solid var(--color-border-tertiary)", background: "none", color: "var(--color-text-secondary)", fontSize: 13, fontWeight: 500, cursor: "pointer" }}>
                <Ic n="upload" s={14} /> Importar backup
              </button>
            </div>
            <div style={{ display: "flex", gap: 8, alignItems: "flex-start", marginTop: 12, fontSize: 12, color: "var(--color-text-secondary)" }}>
              <Ic n="shield" s={14} style={{ marginTop: 1, flexShrink: 0, opacity: 0.7 }} />
              <span>Suas receitas ficam guardadas só neste aparelho. Faça um backup de vez em quando para não perder nada — guarde o arquivo no WhatsApp ou na nuvem.</span>
            </div>
          </Card>
          {msg && (
            <div style={{
              display: "flex", alignItems: "flex-start", gap: 8, padding: "10px 12px", marginBottom: 12,
              borderRadius: "var(--border-radius-md)", fontSize: 13,
              background: msg.tipo === "erro" ? "rgba(163,45,45,0.08)" : "var(--color-background-success)",
              color: msg.tipo === "erro" ? "var(--color-text-danger)" : "var(--color-text-success)",
              border: "0.5px solid " + (msg.tipo === "erro" ? "var(--color-text-danger)" : "var(--color-text-success)"),
            }}>
              <Ic n={msg.tipo === "erro" ? "alert" : "check"} s={15} style={{ marginTop: 1, flexShrink: 0 }} />
              <span>{msg.texto}</span>
              <button onClick={() => setMsg(null)} style={{ marginLeft: "auto", background: "none", border: "none", color: "inherit", cursor: "pointer", fontSize: 16, lineHeight: 1 }}>×</button>
            </div>
          )}
          {importPreview && (
            <Card highlight>
              <p style={{ margin: "0 0 12px", fontSize: 14 }}>
                Encontradas <strong>{importPreview.novas}</strong> receita(s) nova(s) e{" "}
                <strong>{importPreview.atualizadas}</strong> atualização(ões). Confirmar importação?
              </p>
              <div style={{ display: "flex", gap: 8 }}>
                <button onClick={confirmarImportacao} style={{ padding: "8px 14px", border: "none", borderRadius: 8, background: C.coral400, color: "#fff", cursor: "pointer", fontSize: 14, fontWeight: 500 }}>
                  Confirmar importação
                </button>
                <button onClick={cancelarImportacao} style={{ padding: "8px 14px", border: "0.5px solid var(--color-border-tertiary)", borderRadius: 8, background: "none", color: "var(--color-text-secondary)", cursor: "pointer", fontSize: 14 }}>
                  Cancelar
                </button>
              </div>
            </Card>
          )}
          {produtos.length === 0 ? (
          <Card>
            <div style={{ textAlign: "center", padding: "36px 16px", color: "var(--color-text-secondary)" }}>
              <div style={{ width: 64, height: 64, margin: "0 auto 14px", borderRadius: "50%", background: C.coral50, display: "flex", alignItems: "center", justifyContent: "center" }}>
                <Ic n="chef" s={30} c={C.coral400} />
              </div>
              <p style={{ fontSize: 15, fontWeight: 500, color: "var(--color-text-primary)", margin: "0 0 4px" }}>Ainda não há receitas salvas</p>
              <p style={{ fontSize: 13, margin: 0 }}>Crie uma receita na Calculadora e toque em "Salvar produto". Ela aparece aqui.</p>
            </div>
          </Card>
        ) : (
          produtos.map((p) => {
            const aberto = expandido === p.id;
            return (
              <Card key={p.id}>
                <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 12 }}>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 15, fontWeight: 500 }}>{p.produto || "Sem nome"}</div>
                    <div style={{ fontSize: 12, color: "var(--color-text-secondary)", marginTop: 2 }}>Salvo em {fmtData(p.savedAt)} · {p.tipoRend === "kg" ? String(p.rendimento).replace(".", ",") + " kg" : Math.max(parseInt(p.rendimento) || 1, 1) + " unidades"}</div>
                  </div>
                  <div style={{ textAlign: "right" }}>
                    <div style={{ fontSize: 11, color: "var(--color-text-secondary)" }}>Preço de venda ({p.margem || 50}%){p.tipoRend === "kg" ? " — por kg" : ""}</div>
                    <div style={{ fontSize: 18, fontWeight: 500, color: C.coral600 }}>{fmt(p.precoVenda)}</div>
                  </div>
                </div>
                <div style={{ display: "flex", gap: 14, marginTop: 10, paddingTop: 10, borderTop: "0.5px solid var(--color-border-tertiary)", fontSize: 13 }}>
                  <span style={{ color: "var(--color-text-secondary)" }}>{p.tipoRend === "kg" ? "Custo/kg" : "Custo/un."}: <span style={{ color: "var(--color-text-primary)", fontWeight: 500 }}>{fmt(p.custoPorUn)}</span></span>
                  <span style={{ color: "var(--color-text-secondary)" }}>{p.tipoRend === "kg" ? "Lucro/kg" : "Lucro/un."}: <span style={{ color: "var(--color-text-success)", fontWeight: 500 }}>+{fmt(p.precoVenda - p.custoPorUn)}</span></span>
                </div>
                {aberto && (
                  <div className="reveal" style={{ marginTop: 12, background: "var(--color-background-secondary)", borderRadius: "var(--border-radius-md)", padding: "12px 14px" }}>
                    <p style={{ fontSize: 11, color: "var(--color-text-secondary)", fontWeight: 500, textTransform: "uppercase", letterSpacing: "0.5px", marginBottom: 8 }}>Ingredientes</p>
                    {p.ingredientes.filter((i) => i.nome || i.custo).map((i, idx) => (
                      <div key={idx} style={{ display: "flex", justifyContent: "space-between", fontSize: 13, padding: "2px 0" }}>
                        <span style={{ color: "var(--color-text-secondary)" }}>{i.nome || "—"}</span>
                        <span>{fmt(parseNum(i.custo))}</span>
                      </div>
                    ))}
                    <div style={{ borderTop: "0.5px solid var(--color-border-tertiary)", marginTop: 8, paddingTop: 8 }}>
                      {[
                        { l: "Embalagem", v: parseNum(p.embalagem) },
                        { l: "Gás / Energia", v: parseNum(p.gasEnergia) },
                        { l: "Outros", v: parseNum(p.outros) },
                        { l: "Mão de obra", v: ((parseInt(p.horas) || 0) + (parseInt(p.minutos) || 0) / 60) * parseNum(p.valorHora) },
                      ].filter((r) => r.v > 0).map((r) => (
                        <div key={r.l} style={{ display: "flex", justifyContent: "space-between", fontSize: 13, padding: "2px 0" }}>
                          <span style={{ color: "var(--color-text-secondary)" }}>{r.l}</span><span>{fmt(r.v)}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
                <div style={{ display: "flex", gap: 8, marginTop: 12, alignItems: "center" }}>
                  <button onClick={() => carregar(p)} style={{ display: "flex", alignItems: "center", gap: 6, padding: "7px 12px", borderRadius: "var(--border-radius-md)", border: "0.5px solid " + C.coral200, background: C.coral50, color: C.coral600, fontSize: 13, fontWeight: 500, cursor: "pointer" }}>
                    <Ic n="calc" s={13} /> Abrir / editar
                  </button>
                  <button onClick={() => setExpandido(aberto ? null : p.id)} style={{ display: "flex", alignItems: "center", gap: 6, padding: "7px 12px", borderRadius: "var(--border-radius-md)", border: "0.5px solid var(--color-border-tertiary)", background: "none", color: "var(--color-text-secondary)", fontSize: 13, cursor: "pointer" }}>
                    <Ic n="chevron" s={13} style={{ transform: aberto ? "rotate(180deg)" : "none" }} /> {aberto ? "Ocultar" : "Composição"}
                  </button>
                  <button onClick={() => excluir(p.id)} style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: 6, padding: "7px 12px", borderRadius: "var(--border-radius-md)", border: "0.5px solid var(--color-border-tertiary)", background: "none", color: "var(--color-text-danger)", fontSize: 13, cursor: "pointer" }}>
                    <Ic n="trash" s={13} /> Excluir
                  </button>
                </div>
              </Card>
            );
          })
        )}
        </React.Fragment>
      )}
    </div>
  );
}

/* ============================================================
   6) INICIALIZA O APP NA TELA
   ============================================================ */
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
